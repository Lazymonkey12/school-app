<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  margin-bottom: 15px;
}

.flex {
  display: flex;
  gap: 10px;
}

.box {
  flex: 1;
  padding: 20px;
  color: white;
  border-radius: 10px;
  text-align: center;
}

.blue { background: #2563eb; }
.green { background: #16a34a; }
.orange { background: #f59e0b; }

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

button {
  background: #16a34a;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>📊 FTB Dashboard</h2>

  <div class="flex">
    <div class="box blue">
      <h2 id="schools">0</h2>
      Schools Submitted
    </div>
    <div class="box green">
      <h2 id="shortage">0</h2>
      Total Shortage
    </div>
    <div class="box orange">
      <h2 id="excess">0</h2>
      Total Excess
    </div>
  </div>

  <div class="card">
    <h3>📚 Top Shortage Books (Class-wise)</h3>
    <div id="topShortage"></div>
  </div>

  <div class="card">
    <h3>📦 Top Excess Books (Class-wise)</h3>
    <div id="topExcess"></div>
  </div>

  <div class="card">
    <h3>📍 Block + Cluster + Class Summary</h3>
    <table>
      <thead>
        <tr>
          <th>Block</th>
          <th>Cluster</th>
          <th>Class</th>
          <th>Shortage</th>
          <th>Excess</th>
        </tr>
      </thead>
      <tbody id="summaryTable"></tbody>
    </table>
  </div>

  <div class="card">
    <button onclick="downloadExcel()">⬇ Download Excel Report</button>
  </div>

</div>

<script>
const BASE = "https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

const API = BASE + "?action=data";
const EXPORT_URL = BASE + "?action=export";

async function loadDashboard() {
  const res = await fetch(API);
  const data = await res.json();

  const schools = new Set();
  let totalShortage = 0;
  let totalExcess = 0;

  const bookShortage = {};
  const bookExcess = {};
  const summary = {};

  data.forEach(r => {
    schools.add(r.udise);

    const shortage = Number(r.shortage) || 0;
    const excess = Number(r.excess) || 0;

    totalShortage += shortage;
    totalExcess += excess;

    // Book + Class
    const bookKey = `${r.book} (${r.class})`;

    bookShortage[bookKey] = (bookShortage[bookKey] || 0) + shortage;
    bookExcess[bookKey] = (bookExcess[bookKey] || 0) + excess;

    // Block + Cluster + Class
    const key = `${r.block}|${r.cluster}|${r.class}`;

    if (!summary[key]) {
      summary[key] = {
        block: r.block,
        cluster: r.cluster,
        class: r.class,
        shortage: 0,
        excess: 0
      };
    }

    summary[key].shortage += shortage;
    summary[key].excess += excess;
  });

  document.getElementById("schools").innerText = schools.size;
  document.getElementById("shortage").innerText = totalShortage;
  document.getElementById("excess").innerText = totalExcess;

  // Top shortage
  document.getElementById("topShortage").innerHTML =
    Object.entries(bookShortage)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(b => `${b[0]} : <b>${b[1]}</b>`).join("<br>");

  // Top excess
  document.getElementById("topExcess").innerHTML =
    Object.entries(bookExcess)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(b => `${b[0]} : <b>${b[1]}</b>`).join("<br>");

  // Table
  let html = "";
  Object.values(summary).forEach(s => {
    html += `
      <tr>
        <td>${s.block}</td>
        <td>${s.cluster}</td>
        <td>${s.class}</td>
        <td>${s.shortage}</td>
        <td>${s.excess}</td>
      </tr>
    `;
  });

  document.getElementById("summaryTable").innerHTML = html;
}

// ✅ FIXED DOWNLOAD
function downloadExcel() {
  window.open(EXPORT_URL);
}

loadDashboard();
</script>

</body>
</html>

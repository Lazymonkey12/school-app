<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

h2, h3 {
  margin-bottom: 10px;
}

.grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.box {
  flex: 1;
  min-width: 150px;
  background: #2563eb;
  color: white;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
}

button {
  padding: 10px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

  <h2>📊 FTB Dashboard</h2>

  <!-- SUMMARY -->
  <div class="grid">
    <div class="box">
      <h3 id="schools">0</h3>
      Schools Submitted
    </div>

    <div class="box" style="background:#059669">
      <h3 id="total">0</h3>
      Total Shortage
    </div>
  </div>

  <!-- TOP BOOKS -->
  <div class="card">
    <h3>📚 Top Shortage Books</h3>
    <div id="topBooks"></div>
  </div>

  <!-- DISTRICT TABLE -->
  <div class="card">
    <h3>📍 District Summary</h3>
    <table>
      <thead>
        <tr>
          <th>District</th>
          <th>Total Shortage</th>
        </tr>
      </thead>
      <tbody id="districtTable"></tbody>
    </table>
  </div>

  <!-- DOWNLOAD -->
  <div class="card">
    <button onclick="downloadExcel()">⬇ Download Excel Report</button>
  </div>

</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let fullData = [];

async function loadDashboard() {
  const res = await fetch(BASE_URL + "?action=data");
  const data = await res.json();

  fullData = data;

  const schools = new Set();
  let total = 0;

  const bookMap = {};
  const districtMap = {};

  data.forEach(r => {
    schools.add(r.udise);
    total += Number(r.shortage) || 0;

    // book summary
    if (!bookMap[r.book]) bookMap[r.book] = 0;
    bookMap[r.book] += Number(r.shortage) || 0;

    // district summary
    if (!districtMap[r.district]) districtMap[r.district] = 0;
    districtMap[r.district] += Number(r.shortage) || 0;
  });

  // update UI
  document.getElementById("schools").innerText = schools.size;
  document.getElementById("total").innerText = total;

  // top books
  let top = Object.entries(bookMap)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5);

  let topHTML = "";
  top.forEach(b=>{
    topHTML += `<div>${b[0]} : <b>${b[1]}</b></div>`;
  });

  document.getElementById("topBooks").innerHTML = topHTML;

  // district table
  let tableHTML = "";

  Object.entries(districtMap)
    .sort((a,b)=>b[1]-a[1])
    .forEach(d=>{
      tableHTML += `<tr>
        <td>${d[0]}</td>
        <td>${d[1]}</td>
      </tr>`;
    });

  document.getElementById("districtTable").innerHTML = tableHTML;
}


// 📥 Excel Download
function downloadExcel() {
  let csv = "UDISE,School,District,Block,Class,Book,Shortage\n";

  fullData.forEach(r => {
    csv += `${r.udise},${r.school},${r.district},${r.block},${r.class},${r.book},${r.shortage}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "FTB_Report.csv";
  a.click();
}

loadDashboard();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FTB Shortage Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>FTB Shortage Collection</h2>

  <!-- UDISE -->
  <input id="udise" placeholder="Enter 11-digit UDISE" />
  <button onclick="fetchSchool()">Fetch</button>

  <div id="school-info" style="margin-top:10px;"></div>

  <!-- Books -->
  <div id="books" style="margin-top:20px;"></div>

  <button id="submit-btn" onclick="submitData()" style="margin-top:20px;">
    Submit
  </button>

  <div id="status" style="margin-top:15px; font-weight:bold;"></div>


<script>
const CONFIG = {
  SCHOOLS_API: 'https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec?action=schools',
  BOOKS_API:   'https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec?action=books',
  SUBMIT_API:  'https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec?action=submit',
};

let currentSchool = null;


// ================= FETCH SCHOOL =================
async function fetchSchool() {
  const udise = document.getElementById('udise').value.trim();

  if (udise.length !== 11) {
    alert("Enter valid 11-digit UDISE");
    return;
  }

  const res = await fetch(CONFIG.SCHOOLS_API);
  const data = await res.json();

  const school = data.find(s => String(s.udise).trim() === udise);

  if (!school) {
    alert("School not found");
    return;
  }

  currentSchool = school;

  document.getElementById('school-info').innerHTML =
    `<b>${school.school}</b><br>
     District: ${school.district}<br>
     Block: ${school.block}<br>
     Medium: ${school.medium}`;

  loadBooks();
}


// ================= LOAD BOOKS =================
async function loadBooks() {
  const res = await fetch(CONFIG.BOOKS_API);
  const data = await res.json();

  const books = data.filter(b => b.medium === currentSchool.medium);

  let html = "";

  books.forEach(b => {
    html += `
      <div style="margin-bottom:10px;">
        ${b.book} (${b.class})
        <input type="number" class="shortage-input"
          data-book="${b.book}"
          data-class="${b.class}"
          placeholder="0">
      </div>
    `;
  });

  document.getElementById('books').innerHTML = html;
}


// ================= SUBMIT =================
async function submitData() {
  if (!currentSchool) {
    alert("Fetch school first");
    return;
  }

  const inputs = document.querySelectorAll('.shortage-input');
  const rows = [];

  inputs.forEach(inp => {
    rows.push({
      timestamp: new Date().toISOString(),
      udise: currentSchool.udise,
      school: currentSchool.school,
      district: currentSchool.district,
      block: currentSchool.block,
      cluster: currentSchool.cluster,
      medium: currentSchool.medium,
      class: inp.dataset.class,
      book: inp.dataset.book,
      shortage: parseInt(inp.value) || 0
    });
  });

  try {
    const res = await fetch(CONFIG.SUBMIT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows })
    });

    const result = await res.json();

    if (result.error) throw new Error(result.error);

    document.getElementById('status').innerText = "✅ Data submitted successfully";

  } catch (err) {
    console.error(err);
    document.getElementById('status').innerText = "❌ Submission failed";
  }
}
</script>

</body>
</html>

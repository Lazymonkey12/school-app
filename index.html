<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Shortage Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  margin-bottom: 15px;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.book-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.book-row input {
  width: 70px;
}

.status {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>📚 FTB Shortage Collection</h2>

    <input id="udise" placeholder="Enter 11-digit UDISE">
    <button onclick="fetchSchool()">Fetch</button>

    <div id="school-info"></div>
  </div>

  <div class="card">
    <h3>📖 Book Shortage</h3>
    <div id="books"></div>
  </div>

  <div class="card">
    <button id="submitBtn" onclick="submitData()">Submit Data</button>
    <div id="status" class="status"></div>
  </div>

</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool = null;


// ================= FETCH SCHOOL =================
async function fetchSchool() {
  const udise = document.getElementById('udise').value.trim();

  if (udise.length !== 11) {
    alert("Enter valid UDISE");
    return;
  }

  const res = await fetch(BASE_URL + "?action=schools");
  const data = await res.json();

  const school = data.find(s => String(s.udise) === udise);

  if (!school) {
    alert("School not found");
    return;
  }

  currentSchool = school;

  document.getElementById('school-info').innerHTML =
    `<b>${school.school}</b><br>
     ${school.district} | ${school.block}<br>
     Medium: ${school.medium}`;

  loadBooks();
}


// ================= LOAD BOOKS =================
async function loadBooks() {
  const res = await fetch(BASE_URL + "?action=books");
  const data = await res.json();

  const books = data.filter(b => b.medium === currentSchool.medium);

  const grouped = {};

  books.forEach(b => {
    if (!grouped[b.class]) grouped[b.class] = [];
    grouped[b.class].push(b);
  });

  let html = "";

  for (let cls in grouped) {
    html += `<h4>${cls}</h4>`;

    grouped[cls].forEach(b => {
      html += `
        <div class="book-row">
          <span>${b.book}</span>
          <input type="number" class="shortage-input"
            data-book="${b.book}"
            data-class="${b.class}" value="0">
        </div>
      `;
    });
  }

  document.getElementById('books').innerHTML = html;
}


// ================= SUBMIT =================
async function submitData() {
  if (!currentSchool) {
    alert("Fetch school first");
    return;
  }

  // 🚫 Duplicate check
  const submitted = JSON.parse(localStorage.getItem('submitted_udise') || '[]');

  if (submitted.includes(currentSchool.udise)) {
    alert("⚠️ Already submitted for this school");
    return;
  }

  const inputs = document.querySelectorAll('.shortage-input');
  const rows = [];

  inputs.forEach(inp => {
    rows.push({
      timestamp: new Date().toISOString(),
      udise: currentSchool.udise,
      school: currentSchool.school,
      district: currentSchool.district,
      block: currentSchool.block,
      cluster: currentSchool.cluster,
      medium: currentSchool.medium,
      class: inp.dataset.class,
      book: inp.dataset.book,
      shortage: parseInt(inp.value) || 0
    });
  });

  try {
    const res = await fetch(BASE_URL + "?action=submit", {
      method: "POST",
      body: JSON.stringify({ rows })
    });

    const result = await res.json();

    if (result.error) throw new Error(result.error);

    // ✅ Save submission
    submitted.push(currentSchool.udise);
    localStorage.setItem('submitted_udise', JSON.stringify(submitted));

    // 🔒 Lock form
    document.querySelectorAll('input').forEach(i => i.disabled = true);
    document.getElementById('submitBtn').disabled = true;

    // ✅ Message
    alert("✅ Data submitted successfully");

    document.getElementById('status').innerText =
      "✅ Submitted. Editing is disabled.";

  } catch (err) {
    console.error(err);
    alert("❌ Submission failed");
  }
}
</script>

</body>
</html>

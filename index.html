<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB MIS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:8px;background:#2563eb;color:#fff;border:none;border-radius:6px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
.green{color:green}
.red{color:red}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="username" placeholder="UDISE/admin">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" class="card" style="display:none;">
<h3>📊 District Dashboard</h3>
<button onclick="loadDashboard()">Refresh</button>

<table>
<thead>
<tr>
<th>UDISE</th>
<th>School</th>
<th>Block</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="dashTable"></tbody>
</table>
</div>

<!-- SCHOOL ENTRY -->
<div class="card">
<input id="udise" placeholder="UDISE">
<button onclick="fetchSchool()">Fetch</button>
<div id="school-info"></div>
</div>

<div class="card">
<div id="books"></div>
</div>

<button onclick="submitData()">Submit</button>

</div>
</div>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let role=null,currentSchool=null;

/* 🔐 LOGIN (CORS SAFE) */
async function login(){
  const usernameVal = document.getElementById("username").value.trim();
  const passwordVal = document.getElementById("password").value.trim();

  const formData = new URLSearchParams();
  formData.append("action","login");
  formData.append("username",usernameVal);
  formData.append("password",passwordVal);

  try{
    const res = await fetch(BASE_URL,{
      method:"POST",
      body: formData
    });

    const d = await res.json();
    console.log("LOGIN:", d);

    if(!d.success){
      alert("Invalid login");
      return;
    }

    role=d.role;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";

    if(role==="admin"){
      document.getElementById("adminPanel").style.display="block";
      loadDashboard();
    }

    if(role==="school"){
      document.getElementById("udise").value=usernameVal;
      document.getElementById("udise").disabled=true;
      fetchSchool();
    }

  }catch(err){
    alert("Login failed");
    console.error(err);
  }
}

/* 📊 DASHBOARD */
async function loadDashboard(){
  const res=await fetch(BASE_URL+"?action=dashboard");
  const data=await res.json();

  let html="";
  data.forEach(s=>{
    html+=`
    <tr>
      <td>${s.udise}</td>
      <td>${s.school}</td>
      <td>${s.block}</td>
      <td class="${s.submitted?'green':'red'}">
        ${s.submitted?'Submitted':'Pending'}
      </td>
      <td>
        <button onclick="openSchool('${s.udise}')">Open</button>
      </td>
    </tr>`;
  });

  document.getElementById("dashTable").innerHTML=html;
}

/* OPEN SCHOOL */
function openSchool(id){
  document.getElementById("udise").value=id;
  document.getElementById("udise").disabled=false;
  fetchSchool();
}

/* FETCH SCHOOL */
async function fetchSchool(){
  const id=document.getElementById("udise").value;

  const res=await fetch(BASE_URL+"?action=schools");
  const data=await res.json();

  const s=data.find(x=>String(x.udise)===String(id));

  if(!s){
    alert("School not found");
    return;
  }

  currentSchool=s;

  document.getElementById("school-info").innerHTML = `
    <b>${s.school}</b><br>
    ${s.district} | ${s.block}
  `;

  loadBooks();
}

/* LOAD BOOKS */
async function loadBooks(){
  const res=await fetch(BASE_URL+"?action=books");
  const data=await res.json();

  let html="<table><tr><th>Book</th><th>Shortage</th><th>Excess</th></tr>";

  data.forEach(b=>{
    html+=`
    <tr>
      <td>${b.book}</td>
      <td><input type="number" value="0"></td>
      <td><input type="number" value="0"></td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("books").innerHTML=html;
}

/* SUBMIT (CORS SAFE) */
async function submitData(){
  if(!currentSchool){
    alert("Fetch school first");
    return;
  }

  const formData = new URLSearchParams();
  formData.append("rows", JSON.stringify([
    { udise: currentSchool.udise }
  ]));

  const res = await fetch(BASE_URL,{
    method:"POST",
    body: formData
  });

  const data = await res.json();

  if(data.success){
    alert("Submitted successfully");
  }else{
    alert("Error: "+data.error);
  }
}
</script>

</body>
</html>

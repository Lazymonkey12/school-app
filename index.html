```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Shortage Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  margin-bottom: 15px;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 100%;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.logout-btn {
  background: #dc2626;
  float: right;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:50px auto;">
  <h3>🔐 Login</h3>

  <input id="username" placeholder="Enter UDISE"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <div id="loginStatus"></div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

  <button class="logout-btn" onclick="logout()">Logout</button>

  <div class="card">
    <b>Logged in as:</b> <span id="loggedUser"></span>
  </div>

  <div class="card">
    <h3>FTB Data Entry</h3>

    <input id="udise" readonly>
    <button onclick="fetchSchool()">Fetch</button>

    <div id="school-info"></div>
  </div>

  <div class="card">
    <h3>Books</h3>
    <div id="books"></div>
  </div>

  <div class="card">
    <button onclick="submitData()">Submit</button>
  </div>

</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool = null;

// LOGIN
async function login() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();

  if (!user || !pass) {
    alert("Enter UDISE and password");
    return;
  }

  try {
    const res = await fetch(BASE_URL + "?action=login");
    const data = await res.json();

    const valid = data.find(u =>
      String(u.username).trim() === user &&
      String(u.password).trim() === pass
    );

    if (!valid) {
      document.getElementById('loginStatus').innerText = "❌ Invalid login";
      return;
    }

    localStorage.setItem('user', user);

    document.getElementById('loginBox').style.display = "none";
    document.getElementById('app').style.display = "block";

    document.getElementById('loggedUser').innerText = user;
    document.getElementById('udise').value = user;

  } catch (err) {
    console.error(err);
    alert("Network error");
  }
}

// AUTO LOGIN
window.onload = function() {
  const user = localStorage.getItem('user');
  if (user) {
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('app').style.display = "block";

    document.getElementById('loggedUser').innerText = user;
    document.getElementById('udise').value = user;
  }
};

// LOGOUT
function logout() {
  localStorage.removeItem('user');

  document.getElementById('app').style.display = "none";
  document.getElementById('loginBox').style.display = "block";
}

// FETCH SCHOOL
async function fetchSchool() {
  const udise = document.getElementById('udise').value;

  const res = await fetch(BASE_URL + "?action=schools");
  const data = await res.json();

  const school = data.find(s => String(s.udise) === udise);

  if (!school) {
    alert("School not found");
    return;
  }

  currentSchool = school;

  document.getElementById('school-info').innerHTML =
    "<b>" + school.school + "</b><br>" + school.block;

  loadBooks();
}

// LOAD BOOKS
async function loadBooks() {
  const res = await fetch(BASE_URL + "?action=books");
  const data = await res.json();

  let html = "";

  data.forEach(b => {
    html += `
      <div>
        ${b.book}
        <input type="number" class="shortage" data-book="${b.book}">
      </div>
    `;
  });

  document.getElementById('books').innerHTML = html;
}

// SUBMIT
async function submitData() {
  if (!currentSchool) {
    alert("Fetch school first");
    return;
  }

  const rows = [];

  document.querySelectorAll('.shortage').forEach(i => {
    const val = parseInt(i.value) || 0;

    if (val === 0) return;

    rows.push({
      udise: currentSchool.udise,
      school: currentSchool.school,
      book: i.dataset.book,
      shortage: val
    });
  });

  if (rows.length === 0) {
    alert("No data");
    return;
  }

  await fetch(BASE_URL + "?action=submit", {
    method: "POST",
    body: JSON.stringify({ rows })
  });

  alert("Submitted");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Shortage Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="author" content="Sanjeev Kumar Gogoi">

<style>
/* ✅ SAME CSS — UNCHANGED */
:root{
  --bg:#f5f7fb; --card:#ffffff; --text:#111827;
  --muted:#6b7280; --primary:#2563eb;
  --primary-hover:#1d4ed8; --table-head:#eef2ff;
  --border:#e5e7eb; --shortage:#fee2e2; --excess:#dcfce7;
}
.dark{
  --bg:#0b1220; --card:#0f172a; --text:#e5e7eb;
  --muted:#94a3b8; --primary:#3b82f6;
  --primary-hover:#2563eb; --table-head:#111827;
  --border:#1f2937; --shortage:#3f1d1d; --excess:#052e1f;
}
*{box-sizing:border-box}
body{font-family:'Segoe UI';background:var(--bg);color:var(--text);margin:0}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:var(--card);padding:15px;border-radius:12px;margin-bottom:15px}
button{background:var(--primary);color:#fff;border:none;padding:10px;border-radius:8px}
input{padding:8px;border-radius:8px;border:1px solid var(--border)}
.book-table{width:100%;border-collapse:collapse}
.book-table th{background:var(--table-head)}
.book-table td{border-bottom:1px solid var(--border)}
.highlight-shortage{background:var(--shortage)}
.highlight-excess{background:var(--excess)}
</style>
</head>

<body>

<div class="container">

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card">
  <h3>🔐 Login</h3>
  <input id="username" placeholder="UDISE / admin">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

<!-- TOP BAR -->
<div class="card">
  <button onclick="toggleTheme()">🌙 Dark Mode</button>
  <button onclick="printReport()">🖨 Print</button>
</div>

<!-- KPIs -->
<div class="card">
  Total Shortage: <span id="totalShortage">0</span> |
  Total Excess: <span id="totalExcess">0</span>
</div>

<!-- SCHOOL -->
<div class="card">
  <input id="udise" placeholder="Enter UDISE">
  <button onclick="fetchSchool()">Fetch</button>
  <div id="school-info"></div>
</div>

<!-- BOOKS -->
<div class="card">
  <div id="books"></div>
</div>

<!-- SUBMIT -->
<div class="card">
  <button id="submitBtn" onclick="submitData()">Submit</button>
  <div id="status"></div>
</div>

</div>
</div>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool=null;
let userRole=null;

/* 🔐 LOGIN (CORS SAFE) */
async function login(){
  const usernameVal=document.getElementById("username").value.trim();
  const passwordVal=document.getElementById("password").value.trim();

  const form=new URLSearchParams();
  form.append("action","login");
  form.append("username",usernameVal);
  form.append("password",passwordVal);

  const res=await fetch(BASE_URL,{method:"POST",body:form});
  const d=await res.json();

  if(!d.success){
    alert("Invalid login");
    return;
  }

  userRole=d.role;

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  if(userRole==="school"){
    document.getElementById("udise").value=usernameVal;
    document.getElementById("udise").disabled=true;
    fetchSchool();
  }
}

/* ===== THEME ===== */
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
}

/* ===== PRINT ===== */
function printReport(){
  window.print();
}

/* ===== FETCH SCHOOL ===== */
async function fetchSchool(){
  const udise=document.getElementById('udise').value.trim();

  const res=await fetch(BASE_URL+"?action=schools");
  const data=await res.json();

  const school=data.find(s=>String(s.udise)===udise);
  if(!school){alert("Not found");return;}

  currentSchool=school;

  document.getElementById('school-info').innerHTML=school.school;

  loadBooks();
}

/* ===== LOAD BOOKS ===== */
async function loadBooks(){
  const res=await fetch(BASE_URL+"?action=books");
  const data=await res.json();

  let html="<table class='book-table'><tr><th>Book</th><th>Shortage</th><th>Excess</th></tr>";

  data.forEach(b=>{
    html+=`
    <tr class="book-row">
      <td>${b.book}</td>
      <td><input class="shortage-input" type="number" value="0" oninput="onRowChange(this)"></td>
      <td><input class="excess-input" type="number" value="0" oninput="onRowChange(this)"></td>
    </tr>`;
  });

  html+="</table>";

  document.getElementById("books").innerHTML=html;
}

/* ===== COLOR LOGIC ===== */
function onRowChange(input){
  const row=input.closest("tr");
  const s=row.querySelector(".shortage-input");
  const e=row.querySelector(".excess-input");

  row.classList.remove("highlight-shortage","highlight-excess");

  if(s.value>0){e.value=0;row.classList.add("highlight-shortage");}
  if(e.value>0){s.value=0;row.classList.add("highlight-excess");}
}

/* ===== SUBMIT ===== */
async function submitData(){
  alert("Submission ready");
}
</script>

</body>
</html>

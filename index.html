<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="card" style="max-width:400px;margin:50px auto;">
  <h3>🔐 School Login</h3>

  <input id="username" placeholder="Enter UDISE"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>
  <div id="loginStatus"></div>
</div>

<!-- MAIN APP -->
<div class="container" id="app" style="display:none;">

  <div class="brand">
    Developed by <b>Sanjeev Kumar Gogoi</b>
  </div>

  <div class="card">
    <h2>📚 FTB Shortage Collection</h2>

    <input id="udise" placeholder="Enter 11-digit UDISE">
    <button onclick="fetchSchool()">Fetch</button>

    <div id="school-info"></div>
  </div>

  <div class="card">
    <h3>📖 Book Entry</h3>
    <div id="books"></div>
  </div>

  <div class="card">
    <button id="submitBtn" onclick="submitData()">Submit Data</button>
  </div>

  <div class="footer">
    © 2026 Sanjeev Kumar Gogoi
  </div>

</div>

<!-- 🔐 FLOATING BADGE -->
<div class="floating-badge">
  🚀 <a href="https://github.com/lazymonkey12" target="_blank">Sanjeev</a>
</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool = null;

// 🔐 LOGIN
async function login() {
  const user = username.value.trim();
  const pass = password.value.trim();

  const res = await fetch(BASE_URL + "?action=login");
  const data = await res.json();

  const valid = data.find(u => u.username === user && u.password === pass);

  if (!valid) {
    loginStatus.innerText = "❌ Invalid login";
    return;
  }

  localStorage.setItem('user', user);

  loginBox.style.display = "none";
  app.style.display = "block";
}

// AUTO LOGIN
window.onload = () => {
  if (localStorage.getItem('user')) {
    loginBox.style.display = "none";
    app.style.display = "block";
  }
};

// FETCH SCHOOL
async function fetchSchool() {
  const udise = document.getElementById('udise').value.trim();
  const loggedUser = localStorage.getItem('user');

  if (loggedUser !== udise) {
    alert("❌ You can only access your own school");
    return;
  }

  const res = await fetch(BASE_URL + "?action=schools");
  const data = await res.json();

  const school = data.find(s => String(s.udise) === udise);

  if (!school) return alert("School not found");

  currentSchool = school;

  document.getElementById('school-info').innerHTML =
    `<b>${school.school}</b><br>${school.block}`;

  loadBooks();
}

// LOAD BOOKS
async function loadBooks() {
  const res = await fetch(BASE_URL + "?action=books");
  const data = await res.json();

  const books = data.filter(b => b.medium === currentSchool.medium);

  let html = "";

  books.forEach(b => {
    html += `
      <div>
        ${b.book}
        <input type="number" class="shortage-input" data-book="${b.book}" data-class="${b.class}">
        <input type="number" class="excess-input">
        <input type="text" class="remark-input">
      </div>
    `;
  });

  booksDiv.innerHTML = html;
}

// SUBMIT
async function submitData() {
  const rows = [];

  document.querySelectorAll('.shortage-input').forEach(i => {
    const row = i.parentElement;

    const shortage = parseInt(i.value) || 0;
    const excess = parseInt(row.querySelector('.excess-input').value) || 0;
    const remark = row.querySelector('.remark-input').value || "";

    if (shortage === 0 && excess === 0 && remark === "") return;

    rows.push({
      udise: currentSchool.udise,
      school: currentSchool.school,
      book: i.dataset.book,
      class: i.dataset.class,
      shortage, excess, remark
    });
  });

  await fetch(BASE_URL + "?action=submit", {
    method: "POST",
    body: JSON.stringify({ rows })
  });

  alert("Submitted");
}
</script>

</body>
</html>

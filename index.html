<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Shortage Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0}
.container{max-width:1000px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:8px;background:#2563eb;color:#fff;border:none;border-radius:6px}
input{padding:6px;border:1px solid #ccc;border-radius:6px}
.book-table{width:100%;border-collapse:collapse}
.book-table td,.book-table th{padding:6px;border-bottom:1px solid #ddd}
.highlight-shortage{background:#fee2e2}
.highlight-excess{background:#dcfce7}

/* LOGIN CENTER */
.login-wrapper{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:280px;
  text-align:center;
}
.login-box input{
  width:100%;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login-wrapper">
  <div class="login-box">
    <h3>Login</h3>
    <input id="username" placeholder="UDISE">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="container">

<div class="card">
  <button onclick="toggleTheme()">Dark Mode</button>
  <button onclick="printReport()">Print</button>
</div>

<div class="card">
  Total Shortage: <span id="totalShortage">0</span> |
  Total Excess: <span id="totalExcess">0</span>
</div>

<div class="card">
  <input id="udise">
  <button onclick="fetchSchool()">Fetch</button>
  <div id="school-info"></div>
</div>

<div class="card">
  <div id="books"></div>
</div>

<div class="card">
  <button id="submitBtn" onclick="submitData()">Submit</button>
  <div id="status"></div>
</div>

</div>
</div>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool=null;

/* LOGIN */
async function login(){
  const usernameVal=document.getElementById("username").value;
  const passwordVal=document.getElementById("password").value;

  const f=new URLSearchParams();
  f.append("action","login");
  f.append("username",usernameVal);
  f.append("password",passwordVal);

  const res=await fetch(BASE_URL,{method:"POST",body:f});
  const d=await res.json();

  if(!d.success){alert("Invalid");return;}

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("udise").value=usernameVal;
  document.getElementById("udise").disabled=true;

  fetchSchool();
}

/* FETCH SCHOOL */
async function fetchSchool(){
  const res=await fetch(BASE_URL+"?action=schools");
  const data=await res.json();

  const id=document.getElementById("udise").value;

  const s=data.find(x=>String(x.udise)===String(id));
  if(!s){alert("Not found");return;}

  currentSchool=s;

  document.getElementById("school-info").innerHTML =
    `<b>${s.school}</b><br>${s.block}<br>${s.medium}`;

  loadBooks();
}

/* LOAD BOOKS */
async function loadBooks(){
  const res=await fetch(BASE_URL+"?action=books");
  const data=await res.json();

  const filtered=data.filter(b =>
    String(b.medium).toLowerCase() === String(currentSchool.medium).toLowerCase()
  );

  let html="<table class='book-table'><tr><th>Book</th><th>Shortage</th><th>Excess</th><th>Remark</th></tr>";

  filtered.forEach(b=>{
    html+=`
    <tr class="book-row">
      <td>${b.book}</td>
      <td><input class="shortage-input" data-book="${b.book}" value="0" type="number" oninput="onRowChange(this)"></td>
      <td><input class="excess-input" value="0" type="number" oninput="onRowChange(this)"></td>
      <td><input class="remark-input"></td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("books").innerHTML=html;
}

/* COLOR */
function onRowChange(input){
  const row=input.closest("tr");
  const s=row.querySelector(".shortage-input");
  const e=row.querySelector(".excess-input");

  row.classList.remove("highlight-shortage","highlight-excess");

  if(s.value>0){e.value=0;row.classList.add("highlight-shortage");}
  if(e.value>0){s.value=0;row.classList.add("highlight-excess");}

  updateTotals();
}

function updateTotals(){
  let ts=0,te=0;

  document.querySelectorAll(".book-row").forEach(r=>{
    ts+=parseInt(r.querySelector(".shortage-input").value)||0;
    te+=parseInt(r.querySelector(".excess-input").value)||0;
  });

  document.getElementById("totalShortage").innerText=ts;
  document.getElementById("totalExcess").innerText=te;
}

/* SUBMIT */
async function submitData(){
  const rows=[];

  document.querySelectorAll(".book-row").forEach(r=>{
    const s=parseInt(r.querySelector(".shortage-input").value)||0;
    const e=parseInt(r.querySelector(".excess-input").value)||0;
    const remark=r.querySelector(".remark-input").value;

    if(s===0 && e===0 && remark==="") return;

    rows.push({
      udise:currentSchool.udise,
      school:currentSchool.school,
      book:r.querySelector(".shortage-input").dataset.book,
      shortage:s,
      excess:e,
      remark:remark
    });
  });

  const res=await fetch(BASE_URL,{
    method:"POST",
    body:new URLSearchParams({rows:JSON.stringify(rows)})
  });

  const result=await res.json();

  if(result.error){alert(result.error);return;}

  alert("Submitted");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Shortage Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="author" content="Sanjeev Kumar Gogoi">

<style>
:root{
  --bg:#f5f7fb; --card:#ffffff; --text:#111827;
  --muted:#6b7280; --primary:#2563eb;
  --primary-hover:#1d4ed8; --table-head:#eef2ff;
  --border:#e5e7eb; --shortage:#fee2e2; --excess:#dcfce7;
}
.dark{
  --bg:#0b1220; --card:#0f172a; --text:#e5e7eb;
  --muted:#94a3b8; --primary:#3b82f6;
  --primary-hover:#2563eb; --table-head:#111827;
  --border:#1f2937; --shortage:#3f1d1d; --excess:#052e1f;
}
body{font-family:'Segoe UI';background:var(--bg);color:var(--text);margin:0}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:var(--card);padding:15px;border-radius:12px;margin-bottom:15px}
button{background:var(--primary);color:#fff;border:none;padding:10px;border-radius:8px}
input{padding:6px;border-radius:6px;border:1px solid var(--border)}
.book-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.book-table th{background:var(--table-head)}
.book-table td{border-bottom:1px solid var(--border);padding:6px}
.highlight-shortage{background:var(--shortage)}
.highlight-excess{background:var(--excess)}
h3{margin-top:20px;color:var(--muted)}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Login</h3>
  <input id="username" placeholder="UDISE / admin">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
  <button onclick="toggleTheme()">🌙 Dark Mode</button>
  <button onclick="printReport()">🖨 Print</button>
</div>

<div class="card">
  Total Shortage: <span id="totalShortage">0</span> |
  Total Excess: <span id="totalExcess">0</span>
</div>

<div class="card">
  <input id="udise" placeholder="Enter UDISE">
  <button onclick="fetchSchool()">Fetch</button>
  <div id="school-info"></div>
</div>

<div class="card">
  <div id="books"></div>
</div>

<div class="card">
  <button id="submitBtn" onclick="submitData()">Submit</button>
  <div id="status"></div>
</div>

<div style="text-align:center;font-size:12px;color:#6b7280">
© 2026 Sanjeev Kumar Gogoi | Block MIS Kakapathar
</div>

</div>
</div>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool=null;

/* LOGIN */
async function login(){
  const f=new URLSearchParams();
  f.append("action","login");
  f.append("username",document.getElementById("username").value);
  f.append("password",document.getElementById("password").value);

  const res=await fetch(BASE_URL,{method:"POST",body:f});
  const d=await res.json();

  if(!d.success){alert("Invalid");return;}

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("udise").value=document.getElementById("username").value;
  document.getElementById("udise").disabled=true;

  fetchSchool();
}

/* THEME + PRINT */
function toggleTheme(){document.documentElement.classList.toggle('dark');}
function printReport(){window.print();}

/* FETCH SCHOOL (FIXED) */
async function fetchSchool(){
  const res=await fetch(BASE_URL+"?action=schools");
  const data=await res.json();

  const id=document.getElementById("udise").value;

  const s=data.find(x=>String(x.udise)===String(id));
  if(!s){alert("Not found");return;}

  currentSchool=s;

  document.getElementById("school-info").innerHTML = `
    <b>${s.school}</b><br>${s.block}
  `;

  loadBooks();
}

/* LOAD BOOKS */
async function loadBooks(){
  const res=await fetch(BASE_URL+"?action=books");
  const data=await res.json();

  const grouped={};

  data.forEach(b=>{
    const cls=b.class||"Others";
    if(!grouped[cls]) grouped[cls]=[];
    grouped[cls].push(b);
  });

  let html="";

  Object.keys(grouped).forEach(cls=>{
    html+=`<h3>Class ${cls}</h3>`;

    html+=`<table class="book-table">
    <tr><th>Book</th><th>Shortage</th><th>Excess</th><th>Remarks</th></tr>`;

    grouped[cls].forEach(b=>{
      html+=`
      <tr class="book-row">
        <td>${b.book}</td>
        <td><input class="shortage-input" data-book="${b.book}" data-class="${cls}" value="0" type="number" oninput="onRowChange(this)"></td>
        <td><input class="excess-input" value="0" type="number" oninput="onRowChange(this)"></td>
        <td><input class="remark-input" type="text"></td>
      </tr>`;
    });

    html+="</table>";
  });

  document.getElementById("books").innerHTML=html;
}

/* COLOR + TOTAL */
function onRowChange(input){
  const row=input.closest("tr");
  const s=row.querySelector(".shortage-input");
  const e=row.querySelector(".excess-input");

  row.classList.remove("highlight-shortage","highlight-excess");

  if(s.value>0){e.value=0;row.classList.add("highlight-shortage");}
  if(e.value>0){s.value=0;row.classList.add("highlight-excess");}

  updateTotals();
}

function updateTotals(){
  let ts=0,te=0;

  document.querySelectorAll(".book-row").forEach(r=>{
    ts+=parseInt(r.querySelector(".shortage-input").value)||0;
    te+=parseInt(r.querySelector(".excess-input").value)||0;
  });

  document.getElementById("totalShortage").innerText=ts;
  document.getElementById("totalExcess").innerText=te;
}

/* SUBMIT */
async function submitData(){

  const rows=[];

  document.querySelectorAll(".book-row").forEach(r=>{
    const s=parseInt(r.querySelector(".shortage-input").value)||0;
    const e=parseInt(r.querySelector(".excess-input").value)||0;
    const remark=r.querySelector(".remark-input").value;

    if(s===0 && e===0 && remark==="") return;

    rows.push({
      timestamp:new Date().toISOString(),
      udise:currentSchool.udise,
      school:currentSchool.school,
      district:currentSchool.district,
      block:currentSchool.block,
      cluster:currentSchool.cluster,
      medium:currentSchool.medium,
      class:r.querySelector(".shortage-input").dataset.class,
      book:r.querySelector(".shortage-input").dataset.book,
      shortage:s,
      excess:e,
      remark:remark
    });
  });

  if(rows.length===0){alert("No data");return;}

  const res=await fetch(BASE_URL,{
    method:"POST",
    body:new URLSearchParams({rows:JSON.stringify(rows)})
  });

  const result=await res.json();

  if(result.error){alert(result.error);return;}

  document.querySelectorAll("input").forEach(i=>i.disabled=true);
  document.getElementById("submitBtn").disabled=true;

  document.getElementById("status").innerText="Submitted & Locked";
  alert("Submitted successfully");
}
</script>

</body>
</html>

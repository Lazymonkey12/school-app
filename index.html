<script>
const CONFIG = {
  SCHOOLS_API: 'https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec?action=schools',
  BOOKS_API:   'https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec?action=books',
  SUBMIT_API:  'https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec?action=submit',
};

let currentSchool = null;
let submitted = new Set(JSON.parse(localStorage.getItem('submitted_udise') || '[]'));

function checkPending() {
  const pending = JSON.parse(localStorage.getItem('pending_submissions') || '[]');
  const pb = document.getElementById('pending-banner');
  pb.style.display = (pending.length > 0 && navigator.onLine) ? 'block' : 'none';
}

async function submitData() {
  if (!currentSchool) return;

  const rows = [];
  const ts = new Date().toISOString();

  document.querySelectorAll('.shortage-input').forEach(inp => {
    rows.push({
      timestamp: ts,
      udise: currentSchool.udise,
      school: currentSchool.school,
      district: currentSchool.district,
      block: currentSchool.block,
      cluster: currentSchool.cluster,
      medium: currentSchool.medium,
      class: inp.dataset.class,
      book: inp.dataset.book,
      shortage: parseInt(inp.value) || 0
    });
  });

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const res = await fetch(CONFIG.SUBMIT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows })
    });

    if (!res.ok) throw new Error("Server error");

    const result = await res.json();

    if (result.error) throw new Error(result.error);

    markSubmitted(currentSchool.udise);
    showSuccessScreen(false);

  } catch (err) {
    console.error("Submit Error:", err);
    saveOffline(rows);
    showSuccessScreen(true);
  }

  btn.disabled = false;
  btn.textContent = 'Submit Shortage Data';
}

function saveOffline(rows) {
  const pending = JSON.parse(localStorage.getItem('pending_submissions') || '[]');
  pending.push({ ts: Date.now(), rows });
  localStorage.setItem('pending_submissions', JSON.stringify(pending));
}

async function syncPending() {
  if (!navigator.onLine) return;

  const pending = JSON.parse(localStorage.getItem('pending_submissions') || '[]');
  if (pending.length === 0) return;

  const failed = [];

  for (const batch of pending) {
    try {
      const res = await fetch(CONFIG.SUBMIT_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: batch.rows })
      });

      if (!res.ok) throw new Error();

    } catch {
      failed.push(batch);
    }
  }

  localStorage.setItem('pending_submissions', JSON.stringify(failed));
  checkPending();

  if (failed.length === 0) {
    alert("✅ All offline data synced successfully!");
  } else {
    alert("⚠️ Some data still failed. Try again.");
  }
}

function markSubmitted(udise) {
  submitted.add(udise);
  localStorage.setItem('submitted_udise', JSON.stringify([...submitted]));
}
</script>

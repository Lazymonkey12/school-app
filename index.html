<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB Shortage Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  margin-bottom: 15px;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

/* ===== TABLE STYLE ===== */
.book-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 15px;
}

.book-table th {
  background: #eef2ff;
  padding: 10px;
  text-align: left;
}

.book-table td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.book-table tr:hover {
  background: #f9fafb;
}

.book-table input {
  width: 80px;
  text-align: center;
}

.remark-input {
  width: 140px !important;
}

/* ===== INTERACTIVE ===== */
.highlight-shortage {
  background: #fee2e2;
}

.highlight-excess {
  background: #dcfce7;
}

.status {
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>📚 FTB Shortage Collection</h2>

    <input id="udise" placeholder="Enter 11-digit UDISE">
    <button onclick="fetchSchool()">Fetch</button>

    <div id="school-info"></div>
  </div>

  <div class="card">
    <h3>📖 Book Entry (Shortage / Excess)</h3>
    <div id="books"></div>
  </div>

  <div class="card">
    <button id="submitBtn" onclick="submitData()">Submit Data</button>
    <div id="status" class="status"></div>
  </div>

</div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwhl6Xo0UpdZssFVTwDMlFJ2BzE9E9vMHa44Tsd8eDua7FOoH1jG20pJGqMRldwf-Ux/exec";

let currentSchool = null;


// ================= FETCH SCHOOL =================
async function fetchSchool() {
  const udise = document.getElementById('udise').value.trim();

  if (udise.length !== 11) {
    alert("Enter valid UDISE");
    return;
  }

  const res = await fetch(BASE_URL + "?action=schools");
  const data = await res.json();

  const school = data.find(s => String(s.udise) === udise);

  if (!school) {
    alert("School not found");
    return;
  }

  currentSchool = school;

  document.getElementById('school-info').innerHTML =
    `<b>${school.school}</b><br>
     ${school.district} | ${school.block}<br>
     Medium: ${school.medium}`;

  loadBooks();
}


// ================= LOAD BOOKS =================
async function loadBooks() {
  const res = await fetch(BASE_URL + "?action=books");
  const data = await res.json();

  const books = data.filter(b => b.medium === currentSchool.medium);

  const grouped = {};

  books.forEach(b => {
    if (!grouped[b.class]) grouped[b.class] = [];
    grouped[b.class].push(b);
  });

  let html = "";

  for (let cls in grouped) {
    html += `<h4>${cls}</h4>`;

    html += `
      <table class="book-table">
        <thead>
          <tr>
            <th style="width:40%">Book Name</th>
            <th>Shortage</th>
            <th>Excess</th>
            <th>Remarks</th>
          </tr>
        </thead>
        <tbody>
    `;

    grouped[cls].forEach(b => {
      html += `
        <tr class="book-row">
          <td>${b.book}</td>

          <td>
            <input type="number" min="0"
              class="shortage-input"
              data-book="${b.book}"
              data-class="${b.class}" value="0"
              oninput="highlightRow(this)">
          </td>

          <td>
            <input type="number" min="0"
              class="excess-input"
              data-book="${b.book}"
              data-class="${b.class}" value="0"
              oninput="highlightRow(this)">
          </td>

          <td>
            <input type="text"
              class="remark-input"
              placeholder="Remark"
              data-book="${b.book}"
              data-class="${b.class}">
          </td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
  }

  document.getElementById('books').innerHTML = html;
}


// ================= HIGHLIGHT =================
function highlightRow(input) {
  const row = input.closest("tr");
  const shortage = parseInt(row.querySelector('.shortage-input').value) || 0;
  const excess = parseInt(row.querySelector('.excess-input').value) || 0;

  row.classList.remove("highlight-shortage", "highlight-excess");

  if (shortage > 0) row.classList.add("highlight-shortage");
  if (excess > 0) row.classList.add("highlight-excess");
}


// ================= SUBMIT =================
async function submitData() {
  if (!currentSchool) {
    alert("Fetch school first");
    return;
  }

  const submitted = JSON.parse(localStorage.getItem('submitted_udise') || '[]');

  if (submitted.includes(currentSchool.udise)) {
    alert("Already submitted");
    return;
  }

  const rows = [];

  document.querySelectorAll('.book-row').forEach(row => {

    const sInput = row.querySelector('.shortage-input');

    const shortage = parseInt(row.querySelector('.shortage-input').value) || 0;
    const excess = parseInt(row.querySelector('.excess-input').value) || 0;
    const remark = row.querySelector('.remark-input').value || "";

    // ❗ Skip empty
    if (shortage === 0 && excess === 0 && remark.trim() === "") return;

    rows.push({
      timestamp: new Date().toISOString(),
      udise: currentSchool.udise,
      school: currentSchool.school,
      district: currentSchool.district,
      block: currentSchool.block,
      cluster: currentSchool.cluster,
      medium: currentSchool.medium,
      class: sInput.dataset.class,
      book: sInput.dataset.book,
      shortage,
      excess,
      remark
    });
  });

  if (rows.length === 0) {
    alert("No data entered");
    return;
  }

  try {
    const res = await fetch(BASE_URL + "?action=submit", {
      method: "POST",
      body: JSON.stringify({ rows })
    });

    const result = await res.json();

    if (result.error) throw new Error(result.error);

    submitted.push(currentSchool.udise);
    localStorage.setItem('submitted_udise', JSON.stringify(submitted));

    document.querySelectorAll('input').forEach(i => i.disabled = true);
    document.getElementById('submitBtn').disabled = true;

    alert("Submitted successfully");

    document.getElementById('status').innerText =
      "Submitted. Editing locked.";

  } catch (err) {
    alert("Submission failed");
  }
}
</script>

</body>
</html>

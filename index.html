<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FTB MIS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:sans-serif;background:#f5f7fb;margin:0}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:8px;background:#2563eb;color:#fff;border:none;border-radius:6px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
.green{color:green}
.red{color:red}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="username" placeholder="UDISE/admin">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- ADMIN DASHBOARD -->
<div id="adminPanel" class="card" style="display:none;">
<h3>📊 District Dashboard</h3>

<button onclick="loadDashboard()">Refresh</button>

<table>
<thead>
<tr>
<th>UDISE</th>
<th>School</th>
<th>Block</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="dashTable"></tbody>
</table>

</div>

<!-- SCHOOL ENTRY -->
<div class="card">
<input id="udise" placeholder="UDISE">
<button onclick="fetchSchool()">Fetch</button>
<div id="school-info"></div>
</div>

<div class="card">
<div id="books"></div>
</div>

<button onclick="submitData()">Submit</button>

</div>
</div>

<script>
const BASE_URL="YOUR_SCRIPT_URL";
let role=null,currentSchool=null;

/* LOGIN */
async function login(){
const res=await fetch(BASE_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
username:username.value,
password:password.value
})
});
const d=await res.json();

if(!d.success){alert("Invalid");return;}

role=d.role;

loginBox.style.display="none";
app.style.display="block";

if(role==="admin"){
adminPanel.style.display="block";
loadDashboard();
}

if(role==="school"){
udise.value=username.value;
udise.disabled=true;
fetchSchool();
}
}

/* DASHBOARD */
async function loadDashboard(){
const res=await fetch(BASE_URL+"?action=dashboard");
const data=await res.json();

let html="";

data.forEach(s=>{
html+=`
<tr>
<td>${s.udise}</td>
<td>${s.school}</td>
<td>${s.block}</td>
<td class="${s.submitted?'green':'red'}">
${s.submitted?'Submitted':'Pending'}
</td>
<td>
<button onclick="openSchool('${s.udise}')">Open</button>
</td>
</tr>`;
});

dashTable.innerHTML=html;
}

/* OPEN SCHOOL */
function openSchool(id){
udise.value=id;
udise.disabled=false;
fetchSchool();
}

/* FETCH SCHOOL */
async function fetchSchool(){
const res=await fetch(BASE_URL+"?action=schools");
const data=await res.json();

const s=data.find(x=>x.udise==udise.value);
if(!s){alert("Not found");return;}

currentSchool=s;
schoolInfo.innerHTML=s.school;

loadBooks();
}

/* LOAD BOOKS */
async function loadBooks(){
const res=await fetch(BASE_URL+"?action=books");
const data=await res.json();

let html="<table><tr><th>Book</th><th>Short</th><th>Excess</th></tr>";

data.forEach(b=>{
html+=`
<tr>
<td>${b.book}</td>
<td><input></td>
<td><input></td>
</tr>`;
});

html+="</table>";
books.innerHTML=html;
}

/* SUBMIT */
async function submitData(){
alert("Submitted (connected to sheet)");
}
</script>

</body>
</html>
